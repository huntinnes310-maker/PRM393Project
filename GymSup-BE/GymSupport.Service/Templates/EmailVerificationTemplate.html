<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Verify your GymSupport account</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f4f6f8;
            font-family: Helvetica, Arial, sans-serif;
        }

        table {
            border-collapse: collapse;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 18px rgba(15, 23, 42, 0.08);
        }

        .header {
            background: #111827;
            padding: 24px 28px;
        }

        .brand {
            color: #ffffff;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.4px;
        }

        .body {
            padding: 32px 28px;
            color: #334155;
        }

        .title {
            margin: 0 0 16px;
            font-size: 20px;
            line-height: 28px;
            color: #0f1724;
        }

        .text {
            margin: 0 0 18px;
            font-size: 15px;
            line-height: 24px;
            color: #475569;
        }

        .button-wrapper {
            text-align: center;
            margin: 16px 0 4px;
        }

        .button {
            display: inline-block;
            background: #22c55e;
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            padding: 14px 28px;
            border-radius: 10px;
        }

        .fallback {
            margin: 12px 0 0;
            font-size: 13px;
            line-height: 20px;
            color: #64748b;
            word-break: break-word;
        }

        .footer {
            background: #f8fafc;
            padding: 22px 28px;
            font-size: 13px;
            color: #64748b;
            line-height: 20px;
        }

        .small {
            font-size: 12px;
            color: #94a3b8;
        }

        @media only screen and (max-width:600px) {
            .body {
                padding: 24px 20px;
            }

            .header {
                padding: 20px;
            }

            .button {
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>

<body>
    <table role="presentation" class="container" width="100%" cellpadding="0" cellspacing="0">
        <tr>
            <td style="padding:20px 16px;">
                <table role="presentation" class="card" width="100%" cellpadding="0" cellspacing="0">
                    <tr>
                        <td class="header">
                            <span class="brand">GymSupport</span>
                        </td>
                    </tr>
                    <tr>
                        <td class="body">
                            <p class="title">Welcome to GymSupport!</p>
                            <p class="text">Please verify your email address to complete your account setup and start
                                using GymSupport with confidence.</p>
                            <div class="button-wrapper">
                                <a class="button" href="{{VERIFICATION_URL}}" target="_blank">Verify</a>
                            </div>
                            <!-- <p class="fallback">If the button above does not work, copy and paste this link into your browser:</p>
                <p class="fallback"><a href="{{VERIFICATION_URL}}" target="_blank" style="color:#0f1724; text-decoration:underline;">{{VERIFICATION_URL}}</a></p>
                <p class="text">If you did not request this verification, you can safely ignore this email.</p> -->
                        </td>
                    </tr>
                    <tr>
                        <td class="footer">
                            Best regards,<br>GymSupport<br>
                            <span class="small">GymSupport helps you stay strong, consistent, and motivated.</span>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
